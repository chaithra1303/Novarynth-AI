services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/checkpoints:/app/checkpoints
      - ./backend/data:/app/data
    environment:
      - NOVARYNTH_DEVICE=auto

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
